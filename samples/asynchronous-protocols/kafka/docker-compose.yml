services:

  # ── Kafka ──────────────────────────────────────
  kafka:
    image: apache/kafka:4.1.1

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"

      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"

      KAFKA_NUM_PARTITIONS: "3"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Required for single-broker: internal topics can't replicate to 3 nodes.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Kafka UI — http://localhost:8080 ─────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Topic init — creates image-jobs with exactly 3 partitions ─────────────
  # kafka-go's WriterConfig has no AllowAutoTopicCreation in v0.4.x, so we
  # pre-create the topic here to guarantee the correct partition count.
  init-kafka:
    image: apache/kafka:4.1.1
    entrypoint: ["/opt/kafka/bin/kafka-topics.sh"]
    command:
      - "--bootstrap-server"
      - "kafka:9092"
      - "--create"
      - "--topic"
      - "image-jobs"
      - "--partitions"
      - "3"
      - "--replication-factor"
      - "1"
      - "--if-not-exists"
    depends_on:
      kafka:
        condition: service_healthy

  # ── Producer — publishes 30 jobs then exits ───────────────────────────────
  producer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: producer
    environment:
      KAFKA_BROKER: kafka:9092
      JOB_COUNT: "30"
    depends_on:
      kafka:
        condition: service_healthy
      init-kafka:
        condition: service_completed_successfully

  # ── Consumer — one member of the "image-processors" consumer group ─────────
  # Scale with: docker compose up --scale consumer=3
  #
  # With 3 partitions and 3 consumers (same group), Kafka assigns one partition
  # per consumer. Jobs are processed in parallel across all three instances.
  consumer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BINARY: consumer
    environment:
      KAFKA_BROKER: kafka:9092
      CONSUMER_GROUP: image-processors
    depends_on:
      kafka:
        condition: service_healthy
      producer:
        condition: service_completed_successfully

