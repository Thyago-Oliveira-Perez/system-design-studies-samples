services:

  # ── RabbitMQ broker ──────────────────────────────────────────────────────
  # Management UI:  http://localhost:15672   (login: guest / guest)
  # AMQP endpoint:  localhost:5672           (what the Go demos connect to)
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
